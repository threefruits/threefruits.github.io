<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Anxing Xiao</title>
    <meta name="description" content="Notes on robotics research, systems, and related thoughts by Anxing Xiao.">
    <meta property="og:title" content="Blog - Anxing Xiao">
    <meta property="og:description" content="Notes on robotics research, systems, and related thoughts.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://anxingxiao.com/blog.html">
    <meta property="og:image" content="https://anxingxiao.com/assets/img/Robots.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Blog - Anxing Xiao">
    <meta name="twitter:description" content="Notes on robotics research, systems, and related thoughts.">
    <meta name="twitter:image" content="https://anxingxiao.com/assets/img/Robots.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/globals.css">
</head>
<body>
    <div class="background-image"></div>

    <header class="bg-gradient-to-r from-teal-700 to-blue-900 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-white">Anxing Xiao</h1>
                <nav class="flex gap-4">
                    <a href="index.html" class="inline-block px-3 py-1 rounded-md text-white hover:text-white hover:bg-blue-200/10 transition-colors">About Me</a>
                    <a href="research.html" class="inline-block px-3 py-1 rounded-md text-white hover:text-white hover:bg-blue-200/10 transition-colors">Research</a>
                    <a href="publications.html" class="inline-block px-3 py-1 rounded-md text-white hover:text-white hover:bg-blue-200/10 transition-colors">Publications</a>
                    <a href="blog.html" class="inline-block px-3 py-1 rounded-md text-white hover:text-white hover:bg-blue-200/10 transition-colors">Blog</a>
                    <a href="misc.html" class="inline-block px-3 py-1 rounded-md text-white hover:text-white hover:bg-blue-200/10 transition-colors">Misc</a>
                    <a href="join.html" class="inline-block px-3 py-1 rounded-md text-white hover:text-white hover:bg-blue-200/10 transition-colors">Join Us</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="py-8">
        <section class="max-w-7xl mx-auto px-8 py-2">
            <div class="bg-white/60 backdrop-blur-sm p-8 rounded-lg shadow-lg space-y-8">
                <div>
                    <h2 class="text-gray-800 mb-4">Blog</h2>
                    <div class="border-t-2 border-gray-400 w-24 mb-6"></div>
                    <p class="text-gray-700">Notes on robotics research, systems, and related thoughts.</p>
                </div>

                <div class="space-y-6">
                    <article class="blog-post-preview border-b border-gray-200 pb-6">
                        <a href="blog/hello-world.html" class="blog-preview-link">
                            <div class="flex flex-row gap-5 items-start">
                                <div class="blog-preview-thumb shrink-0">
                                    <img src="assets/img/Robots.png"
                                         alt="Hello World cover"
                                         width="320"
                                         height="180"
                                         loading="lazy">
                                </div>
                                <div class="min-w-0 flex-1">
                                    <p class="text-gray-600 text-xs mb-1">July 20, 2026</p>
                                    <h3 class="text-gray-800 mb-2">Hello World</h3>
                                    <p class="text-gray-700">
                                        A short starter post for this site’s blog. Replace or remove it when you publish your first real note.
                                    </p>
                                    <p class="mt-2 text-accent-blue">Read more →</p>
                                </div>
                            </div>
                        </a>
                    </article>
                </div>
            </div>
        </section>
    </main>
    <script>
        (function() {
            const path = (window.location.pathname.split('/').pop() || 'index.html');
            const links = document.querySelectorAll('header nav a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                const isIndex = (path === '' || path === 'index.html');
                const matches = (isIndex && href.endsWith('index.html')) || href.endsWith(path);
                if (matches) {
                    link.classList.remove('text-blue-300');
                    link.classList.add('text-white','underline');
                }
            });
        })();
    </script>
</body>
</html>
